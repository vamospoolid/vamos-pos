version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vamos_pos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/vamos_pos?schema=public
      JWT_SECRET: supersecret_jwt_key_here
      JWT_EXPIRES_IN: 1d
      PORT: 3000
    depends_on:
      - db
    command: sh -c "npx prisma db push && npm run start"

volumes:
  postgres_data:
